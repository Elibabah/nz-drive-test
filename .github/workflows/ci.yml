name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore jest transform cache
        uses: actions/cache@v4
        with:
          path: .jest-cache
          key: jest-cache-${{ runner.os }}-${{ hashFiles('package-lock.json', 'babel.config.js', 'jest.config.js') }}
          restore-keys: |
            jest-cache-${{ runner.os }}-

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npx jest --ci
